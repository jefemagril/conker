name: build_pr

on:
  pull_request_target:
    branches: [master]

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          BASEROM_URL: ${{ secrets.BASEROM_URL }}
        run: |
          if [ -n "$BASEROM_URL" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  build_pr:
    needs: check-secrets
    # Requires BASEROM_URL secret; skip until configured.
    # Only runs for PRs from other repos (fork PRs).
    if: ${{ needs.check-secrets.outputs.ready == 'true' && github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - name: Download baserom
        env:
          BASEROM_URL: ${{ secrets.BASEROM_URL }}
        run: curl -fsSL "$BASEROM_URL" -o baserom.us.z64

      - name: Perform make extract (rom)
        uses: docker://ghcr.io/mkst/conker:latest
        with:
          args: make extract

      - name: Perform make extract (code)
        uses: docker://ghcr.io/mkst/conker:latest
        with:
          args: sh -c "cd conker && make extract"
      - name: Perform make (code)
        uses: docker://ghcr.io/mkst/conker:latest
        with:
          args: sh -c "cd conker && make --jobs"
      - name: Perform make replace
        uses: docker://ghcr.io/mkst/conker:latest
        with:
          args: sh -c "cd conker && make replace"

      - name: Perform make
        uses: docker://ghcr.io/mkst/conker:latest
        with:
          args: make --jobs
