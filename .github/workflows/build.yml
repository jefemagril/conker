name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          BASEROM_URL: ${{ secrets.BASEROM_URL }}
        run: |
          if [ -n "$BASEROM_URL" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-secrets
    # Requires BASEROM_URL secret; skip until configured.
    if: ${{ needs.check-secrets.outputs.ready == 'true' && (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4
      with:
        submodules: recursive
        # Needed so progress_report can resolve the latest decomp-source commit.
        fetch-depth: 0
    - name: Download baserom
      env:
        BASEROM_URL: ${{ secrets.BASEROM_URL }}
      run: curl -fsSL "$BASEROM_URL" -o baserom.us.z64

    - name: Perform make extract (rom)
      uses: docker://ghcr.io/mkst/conker:latest
      with:
        args: make extract

    - name: Perform make extract (code)
      uses: docker://ghcr.io/mkst/conker:latest
      with:
        args: sh -c "cd conker && make extract"
    - name: Perform make (code)
      uses: docker://ghcr.io/mkst/conker:latest
      with:
        args: sh -c "cd conker && make --jobs"
    - name: Perform make replace
      uses: docker://ghcr.io/mkst/conker:latest
      with:
        args: sh -c "cd conker && make replace"

    - name: Perform make
      uses: docker://ghcr.io/mkst/conker:latest
      with:
        args: make --jobs

    - name: Generate progress CSVs
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: docker://ghcr.io/mkst/conker:latest
      with:
        args: sh -c "cd conker && make progress"

    # Run the report on the runner so git metadata resolves (Docker hits safe.directory).
    - name: Update progress chart
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: cd conker && python3 ../tools/progress_report.py

    - name: Commit progress artifacts
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add progress/
        if git diff --staged --quiet; then
          echo "No progress changes"
          exit 0
        fi
        git commit -m "Update decomp progress [skip ci]"
        git push
